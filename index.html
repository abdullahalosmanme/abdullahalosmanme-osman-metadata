<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OSMAN Metadata - AI Stock SEO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background-color: #1a1a2e;
      color: #ffffff;
      font-family: 'Roboto', sans-serif;
      margin: 0;
      padding: 0;
    }
    h1, h2, h3, h4, .font-title {
      font-family: 'Montserrat', sans-serif;
    }
    .accent-red { color: #e94560; }
    .bg-accent-red { background-color: #e94560; }
    .bg-primary-dark { background-color: #0f3460; }
    .bg-deep-navy { background-color: #1a1a2e; }
    .text-light-gray { color: #cccccc; }
    
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #1a1a2e;
    }
    ::-webkit-scrollbar-thumb {
      background: #0f3460;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #e94560;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
